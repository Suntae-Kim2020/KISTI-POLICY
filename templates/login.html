<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로그인 — KISTI Policy 대시보드</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #2f81f7;
    --accent-hover: #4493f8;
    --error: #f85149;
    --input-bg: #0d1117;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 20px;
    margin-bottom: 8px;
    color: var(--text);
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 28px;
  }
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="email"], input[type="password"] {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    transition: border-color 0.15s;
  }
  input[type="email"]:focus, input[type="password"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 18px 0 22px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }
  .remember input { cursor: pointer; }
  button {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 11px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent-hover); }
  .error {
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid rgba(248, 81, 73, 0.3);
    color: var(--error);
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 16px;
  }
  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="login-box">
    <h1>KISTI Policy 대시보드</h1>
    <p class="subtitle">로그인하여 분석 내용을 확인하세요.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      {{ form.hidden_tag() }}
      <div class="field">
        <label for="email">이메일</label>
        {{ form.email(id="email", type="email", autocomplete="username", required=True) }}
      </div>
      <div class="field">
        <label for="password">비밀번호</label>
        {{ form.password(id="password", autocomplete="current-password", required=True) }}
      </div>
      <label class="remember">
        {{ form.remember(id="remember") }}
        <span>로그인 상태 유지 (30일)</span>
      </label>
      <button type="submit">로그인</button>
    </form>

    <div class="footer">
      계정 발급 문의: 관리자에게 요청
    </div>
  </div>
</body>
</html>
